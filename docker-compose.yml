version: "3.8"
services:
  api:
    image: ${DOCKERHUB_USER}/branchat:${IMAGE_TAG}
    container_name: branchat-api
    ports:
      - "8080:8080"
    env_file:
      - ./.env
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://127.0.0.1:8080/actuator/health" ]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 30s
