name: CI-CD

on:
  push:
    branches: ["develop", "main"]
  pull_request:
    branches: ["develop", "main"]

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: ci-cd-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      #캐싱 도와줌
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Docker Hub 로그인(푸시할 때만 필요)
      - name: Log in to Docker Hub
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # 이미지 태그 자동 생성: latest(기본브랜치), 커밋 SHA
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_HUB_USERNAME }}/branchat
          tags: |
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main' }}
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}
      # 도커 이미지 빌드 + 푸시
      - name: Build and (conditionally) Push
        uses: docker/build-push-action@v5
        with:
          context: .
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: ${{ github.event_name != 'pull_request' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  #CD 시작
  deploy:
    needs: build-test
    runs-on: ubuntu-latest
    # "main" 브랜치에 대한 "push"에만 배포
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout (to upload compose from repo root)
        uses: actions/checkout@v4

      # repo 루트의 docker-compose.yml → EC2 /opt/app/ 로 복사
      - name: Upload docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/opt/app"
          overwrite: true
          strip_components: 0

      - name: Connect to EC2 / set up env / launch the application with Docker Compose.
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail

            # 디렉토리/권한 정리
            sudo mkdir -p /opt/app
            sudo chown $USER:$USER /opt/app

            # docker compose 플러그인 없으면 설치
            if ! docker compose version >/dev/null 2>&1; then
              sudo apt-get update && sudo apt-get install -y docker-compose-plugin
            fi

            # 런타임 .env 생성: /run/branchat/.env -> 여기다 하면 배포 끝나면 사라짐. //spring boot 실행에 필요한 애들 넣기 제미나이 api 키 같은거
            sudo mkdir -p /run/branchat && sudo chmod 700 /run/branchat
            cat >/run/branchat/.env <<'EOF'
            SPRING_PROFILES_ACTIVE=test
            # 필요 변수 더 추가하면 여기 아래에 같은 형식으로 작성
            EOF
            sudo chmod 600 /run/branchat/.env
            
            # Docker Hub 로그인 (프라이빗 이미지일 때 필요)
            echo "${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}" | docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin
            
            # 배포 태그: 이 커밋 SHA
            export DOCKERHUB_USER="${{ secrets.DOCKER_HUB_USERNAME }}"
            export IMAGE_TAG="${{ github.sha }}"
            
            # compose 배포
            docker compose -f /opt/app/docker-compose.yml pull
            docker compose -f /opt/app/docker-compose.yml up -d
            
            # 외부(HTTPS) 경유 헬스체크
            echo "Waiting for application to be healthy..."
            for i in {1..20}; do
              if curl -fsS "https://${{ secrets.API_FQDN }}/healthz" >/dev/null; then
                echo "Health check passed!"
                break
              fi
              if [ $i -eq 20 ]; then
                echo "Health check failed after multiple retries."
                exit 1
              fi
              sleep 3
            done

            echo "[deploy] OK: ${DOCKERHUB_USER}/branchat:${IMAGE_TAG}"
