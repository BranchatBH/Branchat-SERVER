name: CI-CD

on:
  push:
    branches: ["develop", "main"]
  pull_request:
    branches: ["develop", "main"]

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: ci-cd-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      #캐싱 도와줌
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Docker Hub 로그인(푸시할 때만 필요)
      - name: Log in to Docker Hub
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # 이미지 태그 자동 생성: latest(기본브랜치), 커밋 SHA
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_HUB_USERNAME }}/branchat
          tags: |
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main' }}
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}
      # 도커 이미지 빌드 + 푸시
      - name: Build and (conditionally) Push
        uses: docker/build-push-action@v5
        with:
          context: .
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: ${{ github.event_name != 'pull_request' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  #CD 시작
  deploy:
    needs: build-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Zip deployment bundle
        run: zip -r deploy.zip appspec.yml scripts/ docker-compose.yml

      - name: Upload to S3
        run: aws s3 cp deploy.zip s3://branchat-deploy-bucket/deploy-${{ github.sha }}.zip

      - name: Deploy to EC2 via CodeDeploy
        id: deploy
        run: |
          DEPLOY_ID=$(aws deploy create-deployment \
            --application-name BranchatApplication \
            --deployment-group-name BranchatDeploymentGroup \
            --s3-location bucket=branchat-deploy-bucket,bundleType=zip,key=deploy-${{ github.sha }}.zip \
            --query 'deploymentId' --output text)
          echo "deployment_id=$DEPLOY_ID" >> $GITHUB_OUTPUT
          echo "Created deployment: $DEPLOY_ID"

      - name: Wait for deployment to finish
        run: aws deploy wait deployment-successful --deployment-id ${{ steps.deploy.outputs.deployment_id }}
