spring:
  config:
    import: optional:file:.env[.properties]
  jackson:
    time-zone: Asia/Seoul
  datasource:
    url: ${LOCAL_SPRING_DATASOURCE_URL}
    username: ${LOCAL_SPRING_DATASOURCE_USERNAME}
    password: ${LOCAL_SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        jdbc:
          time_zone: Asia/Seoul
        time_zone_storage: NORMALIZE_UTC
  web:
    resources:
      add-mappings: false
  google:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
    redirect-uri: ${GOOGLE_REDIRECT_URI}
  jwt:
    secret: ${JWT_SECRET_KEY}
    access-token-expiration-milliseconds: 3600000
    refresh-token-expiration-milliseconds: 604800000
  cookie:
    domain: localhost
    secure: false
    path: /
  data:
    redis:
      host: localhost
      port: 6379
